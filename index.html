<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Phòng thanh tẩy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      overflow: hidden;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #16213e;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      height: 100vh;
      height: 100dvh;
      cursor: none;
      touch-action: none;
      -webkit-touch-callout: none;
    }

    body.level-2 {
      background: linear-gradient(135deg, #2a1020 0%, #1a1028 50%, #0f1a30 100%);
    }

    #game {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #target {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate3d(-50%, -50%, 0) scaleX(var(--flip, 1));
      height: 120px;
      z-index: 10;
      transition:
        left 0.45s cubic-bezier(0.22, 1, 0.36, 1),
        top 0.45s cubic-bezier(0.22, 1, 0.36, 1),
        transform 0.08s ease;
      will-change: left, top;
    }

    .target-img {
      height: 120px;
      width: auto;
      display: block;
      pointer-events: none;
      -webkit-user-drag: none;
      border-radius: 10px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
    }

    @media (max-width: 768px) {
      #target,
      .target-img {
        height: 90px;
      }
    }

    #target.hit {
      transform: translate3d(-50%, -50%, 0) scaleX(var(--flip, 1)) scale(0.88) rotate(-6deg);
    }

    #target.scurry {
      animation: target-wiggle 0.45s ease;
    }

    @keyframes target-wiggle {
      0%, 100% { transform: translate3d(-50%, -50%, 0) scaleX(var(--flip, 1)); }
      25%      { transform: translate3d(-50%, -52%, 0) scaleX(var(--flip, 1)) rotate(4deg); }
      50%      { transform: translate3d(-50%, -48%, 0) scaleX(var(--flip, 1)) rotate(-4deg); }
      75%      { transform: translate3d(-50%, -51%, 0) scaleX(var(--flip, 1)) rotate(2deg); }
    }

    /* Level 2 — đấm nhau */
    #target.level-2 {
      transition: transform 0.12s ease;
    }

    #target.level-2 .target-img {
      height: 150px;
      box-shadow: 0 8px 32px rgba(255, 50, 50, 0.25);
    }

    @media (max-width: 768px) {
      #target.level-2 .target-img {
        height: 120px;
      }
    }

    #target.level-2.hit {
      animation: punch-recoil 0.18s ease;
    }

    @keyframes punch-recoil {
      0%, 100% { transform: translate3d(-50%, -50%, 0) scaleX(var(--flip, 1)); }
      40%      { transform: translate3d(-50%, -54%, 0) scaleX(var(--flip, 1)) scale(0.92) rotate(8deg); }
    }

    #target.level-2.counter {
      animation: enemy-lunge 0.3s ease;
    }

    @keyframes enemy-lunge {
      0%, 100% { transform: translate3d(-50%, -50%, 0) scaleX(var(--flip, 1)); }
      50%      { transform: translate3d(-50%, -42%, 0) scaleX(var(--flip, 1)) scale(1.08); }
    }

    .weapon {
      position: fixed;
      pointer-events: none;
      z-index: 100;
    }

    #hammer {
      width: 100px;
      height: 100px;
      transform-origin: 80% 80%;
    }

    #hammer.swing {
      animation: hammer-swing 0.25s ease-out;
    }

    @keyframes hammer-swing {
      0%   { transform: rotate(0deg) scale(1); }
      40%  { transform: rotate(-55deg) scale(1.15); }
      100% { transform: rotate(0deg) scale(1); }
    }

    .hammer-head {
      position: absolute;
      top: 0;
      left: 10px;
      width: 70px;
      height: 45px;
      background: linear-gradient(180deg, #8b4513, #5c2e0a);
      border-radius: 8px;
      box-shadow: 2px 4px 8px rgba(0,0,0,0.4);
    }

    .hammer-head::before {
      content: "";
      position: absolute;
      top: -5px;
      left: 5px;
      right: 5px;
      height: 8px;
      background: #a0522d;
      border-radius: 4px;
    }

    .hammer-handle {
      position: absolute;
      bottom: 0;
      left: 35px;
      width: 14px;
      height: 60px;
      background: linear-gradient(90deg, #c4a35a, #8b6914);
      border-radius: 4px;
      transform: rotate(15deg);
      transform-origin: top center;
    }

    #fist {
      font-size: 52px;
      line-height: 1;
      display: none;
      transform-origin: center center;
    }

    #fist.show { display: block; }

    #fist.punch {
      animation: fist-punch 0.2s ease-out;
    }

    @keyframes fist-punch {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.35) translateY(-12px); }
      100% { transform: scale(1); }
    }

    .hidden { display: none !important; }

    #ui {
      position: fixed;
      top: 20px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 200;
      pointer-events: none;
    }

    #game-title {
      font-size: 1.1rem;
      color: rgba(255, 215, 0, 0.85);
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    #score {
      font-size: 2rem;
      color: #ffd700;
      text-shadow: 0 0 10px rgba(255,215,0,0.5);
      font-weight: bold;
    }

    #hint {
      margin-top: 8px;
      color: rgba(255,255,255,0.6);
      font-size: 0.95rem;
      padding: 0 16px;
    }

    #hp-bar {
      display: none;
      margin: 10px auto 0;
      width: min(220px, 70vw);
      height: 12px;
      background: rgba(0,0,0,0.45);
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(255,80,80,0.4);
    }

    #hp-bar.show { display: block; }

    #hp-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #ff3333, #ff8844);
      transition: width 0.2s ease;
    }

    #version {
      margin-top: 6px;
      color: rgba(255,255,255,0.25);
      font-size: 0.75rem;
    }

    .impact {
      position: fixed;
      width: 80px;
      height: 80px;
      border: 4px solid #ffd700;
      border-radius: 50%;
      pointer-events: none;
      z-index: 40;
      animation: impact-ring 0.4s ease-out forwards;
    }

    .impact.punch-hit {
      border-color: #ff6b6b;
      width: 60px;
      height: 60px;
    }

    @keyframes impact-ring {
      0%   { transform: translate(-50%, -50%) scale(0.3); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
    }

    .floating-text {
      position: fixed;
      color: #ff6b9d;
      font-size: 1.4rem;
      font-weight: bold;
      pointer-events: none;
      z-index: 60;
      animation: float-up 0.8s ease-out forwards;
    }

    @keyframes float-up {
      0%   { transform: translate(-50%, -50%); opacity: 1; }
      100% { transform: translate(-50%, -150%); opacity: 0; }
    }

    .screen-flash {
      position: fixed;
      inset: 0;
      background: rgba(255, 40, 40, 0.2);
      pointer-events: none;
      z-index: 300;
      animation: flash-fade 0.35s ease-out forwards;
    }

    @keyframes flash-fade {
      to { opacity: 0; }
    }

    #victory {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s ease;
    }

    #victory.show {
      opacity: 1;
      pointer-events: auto;
    }

    .victory-bg {
      position: absolute;
      inset: 0;
      background: rgba(8, 12, 32, 0.88);
    }

    .victory-glow {
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 215, 0, 0.35) 0%, transparent 70%);
      animation: glow-pulse 2s ease-in-out infinite;
    }

    @keyframes glow-pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50%      { transform: scale(1.15); opacity: 1; }
    }

    .victory-card {
      position: relative;
      max-width: 340px;
      width: 100%;
      padding: 32px 24px;
      text-align: center;
      background: linear-gradient(160deg, #1e2a4a 0%, #121a30 100%);
      border: 2px solid rgba(255, 215, 0, 0.45);
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      transform: scale(0.85);
      opacity: 0;
    }

    #victory.show .victory-card {
      animation: card-pop 0.55s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
    }

    @keyframes card-pop {
      to { transform: scale(1); opacity: 1; }
    }

    .victory-icon {
      font-size: 3rem;
      line-height: 1;
      margin-bottom: 12px;
      animation: icon-bounce 0.8s ease 0.3s both;
    }

    @keyframes icon-bounce {
      0%   { transform: scale(0); }
      60%  { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .victory-card h1 {
      color: #ffd700;
      font-size: 1.35rem;
      line-height: 1.4;
      margin-bottom: 10px;
    }

    .victory-card p {
      color: rgba(255, 255, 255, 0.85);
      font-size: 1rem;
      line-height: 1.5;
    }

    .victory-sub {
      margin-top: 8px;
      color: rgba(255, 255, 255, 0.55) !important;
      font-size: 0.9rem !important;
    }

    .victory-tap {
      margin-top: 20px;
      padding: 10px 16px;
      color: rgba(255, 215, 0, 0.8);
      font-size: 0.85rem;
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 999px;
      animation: tap-blink 1.5s ease-in-out infinite;
    }

    @keyframes tap-blink {
      0%, 100% { opacity: 0.6; }
      50%      { opacity: 1; }
    }

    .confetti-piece {
      position: absolute;
      top: -10px;
      width: 8px;
      height: 14px;
      border-radius: 2px;
      opacity: 0;
      pointer-events: none;
    }

    #victory.show .confetti-piece {
      animation: confetti-fall 2.2s ease-out forwards;
    }

    .confetti-piece:nth-child(1) { left: 12%; background: #ffd700; animation-delay: 0.1s; }
    .confetti-piece:nth-child(2) { left: 28%; background: #ff6b9d; animation-delay: 0.2s; }
    .confetti-piece:nth-child(3) { left: 45%; background: #7ee8fa; animation-delay: 0.05s; }
    .confetti-piece:nth-child(4) { left: 62%; background: #c9a0ff; animation-delay: 0.25s; }
    .confetti-piece:nth-child(5) { left: 78%; background: #90ee90; animation-delay: 0.15s; }
    .confetti-piece:nth-child(6) { left: 90%; background: #ffa07a; animation-delay: 0.3s; }

    @keyframes confetti-fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* Finale — nền thiêng + sét */
    #finale-bg {
      position: fixed;
      inset: 0;
      z-index: 20;
      background-color: #1a1020;
      background-image: url("https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExZmhkMmo0c2t1eXd2MzEycHhwM3h4MnUxNXdyeDN5NnNrbzQ5ZzcyYiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/xUOwG3sgHkdqoy41wY/giphy.gif");
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.2s ease;
      pointer-events: none;
    }

    #finale-bg.show { opacity: 1; }

    #lightning {
      position: fixed;
      top: 0;
      left: 0;
      width: 80px;
      height: 0;
      z-index: 55;
      pointer-events: none;
      opacity: 0;
      filter: drop-shadow(0 0 12px #fff) drop-shadow(0 0 24px #ffeb3b);
    }

    #lightning.strike {
      animation: bolt-strike 0.55s ease-out forwards;
    }

    @keyframes bolt-strike {
      0%   { height: 0; opacity: 0; }
      15%  { opacity: 1; }
      30%  { opacity: 1; }
      45%  { opacity: 0.4; }
      60%  { opacity: 1; }
      100% { opacity: 0; }
    }

    #lightning path {
      fill: #fffef5;
      stroke: #ffe566;
      stroke-width: 2;
    }

    body.finale-flash #game {
      animation: screen-white-flash 0.55s ease-out;
    }

    @keyframes screen-white-flash {
      0%, 100% { filter: brightness(1); }
      25%, 55%  { filter: brightness(2.5); }
      40%      { filter: brightness(1.6); }
    }

    #target.finale-victim {
      z-index: 50;
      transition: transform 0.3s ease, filter 0.3s ease, opacity 0.8s ease 0.4s;
    }

    #target.lightning-hit {
      animation: victim-struck 0.6s ease forwards;
    }

    @keyframes victim-struck {
      0%   { transform: translate3d(-50%, -50%, 0) scaleX(var(--flip, 1)) scale(1); filter: brightness(1); }
      20%  { transform: translate3d(-50%, -50%, 0) scaleX(var(--flip, 1)) scale(1.1); filter: brightness(3); }
      50%  { transform: translate3d(-50%, -50%, 0) scaleX(var(--flip, 1)) scale(0.85) rotate(12deg); filter: brightness(2); }
      100% { transform: translate3d(-50%, -50%, 0) scaleX(var(--flip, 1)) scale(0.7) rotate(20deg); filter: brightness(0.4); opacity: 0.3; }
    }

    #ui.finale-hidden {
      opacity: 0;
      transition: opacity 0.5s ease;
    }
  </style>
</head>
<body>
  <div id="game">
    <div id="ui">
      <div id="game-title">Phòng thanh tẩy · Lv.1</div>
      <div id="score">Điểm: 0</div>
      <div id="hp-bar"><div id="hp-fill"></div></div>
      <div id="hint">Phòng sám hối — đập nghiệp chướng!</div>
      <div id="version">v7</div>
    </div>

    <div id="target">
      <img class="target-img" src="mouse.png" alt="Đối thủ" draggable="false" />
    </div>

    <div id="hammer" class="weapon">
      <div class="hammer-head"></div>
      <div class="hammer-handle"></div>
    </div>

    <div id="fist" class="weapon">👊</div>
  </div>

  <div id="finale-bg" aria-hidden="true"></div>
  <svg id="lightning" viewBox="0 0 80 400" preserveAspectRatio="none" aria-hidden="true">
    <path d="M48 0 L28 170 L52 170 L18 400 L62 155 L38 155 Z" />
  </svg>

  <div id="victory" aria-hidden="true">
    <div class="victory-bg"></div>
    <div class="victory-glow"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="victory-card">
      <div class="victory-icon" id="victory-icon">🙏</div>
      <h1 id="victory-title">Thanh tẩy Level 1!</h1>
      <p id="victory-desc">Bạn đã giải trừ nghiệp chướng cơ bản.</p>
      <p class="victory-sub" id="victory-sub">Sẵn sàng đấm tay đôi chưa?</p>
      <div class="victory-tap" id="victory-tap">Chạm để vào Level 2</div>
    </div>
  </div>

  <script>
    const hammer = document.getElementById("hammer");
    const fist = document.getElementById("fist");
    const target = document.getElementById("target");
    const scoreEl = document.getElementById("score");
    const hintEl = document.getElementById("hint");
    const titleEl = document.getElementById("game-title");
    const hpBar = document.getElementById("hp-bar");
    const hpFill = document.getElementById("hp-fill");
    const victoryEl = document.getElementById("victory");
    const victoryIcon = document.getElementById("victory-icon");
    const victoryTitle = document.getElementById("victory-title");
    const victoryDesc = document.getElementById("victory-desc");
    const victorySub = document.getElementById("victory-sub");
    const victoryTap = document.getElementById("victory-tap");
    const finaleBg = document.getElementById("finale-bg");
    const lightning = document.getElementById("lightning");
    const uiEl = document.getElementById("ui");

    const WIN_SCORE = 10;
    const ENEMY_MAX_HP = 100;
    const PUNCH_DAMAGE = 10;
    const COUNTER_EVERY = 4;

    let level = 1;
    let score = 0;
    let enemyHp = ENEMY_MAX_HP;
    let punchCount = 0;
    let victoryShown = false;
    let finaleSequence = false;
    let victoryMode = "level1";
    let targetX = window.innerWidth / 2;
    let targetY = window.innerHeight / 2;
    let isScurrying = false;
    let weaponX = targetX;
    let weaponY = targetY;

    function setTargetPosition(x, y) {
      targetX = x;
      targetY = y;
      target.style.left = x + "px";
      target.style.top = y + "px";
    }

    function randomTargetPosition(fromX, fromY) {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const rect = target.getBoundingClientRect();
      const padX = rect.width / 2 + 20;
      const padY = rect.height / 2 + 60;
      let x, y, tries = 0;

      do {
        x = padX + Math.random() * (w - padX * 2);
        y = padY + Math.random() * (h - padY * 2);
        tries++;
      } while (
        tries < 20 &&
        fromX !== undefined &&
        Math.hypot(x - fromX, y - fromY) < Math.min(w, h) * 0.25
      );

      return { x, y };
    }

    function getTargetCenter() {
      return { x: targetX, y: targetY };
    }

    function isHitOnTarget(x, y) {
      const rect = target.getBoundingClientRect();
      const pad = level === 2 ? 30 : 20;
      return (
        x >= rect.left - pad &&
        x <= rect.right + pad &&
        y >= rect.top - pad &&
        y <= rect.bottom + pad
      );
    }

    function scurryAway() {
      if (isScurrying || level !== 1) return;
      isScurrying = true;

      const { x: newX, y: newY } = randomTargetPosition(targetX, targetY);
      const flip = newX < targetX ? -1 : 1;
      target.style.setProperty("--flip", flip);

      target.classList.add("scurry");
      setTargetPosition(newX, newY);

      setTimeout(() => {
        target.classList.remove("scurry");
        isScurrying = false;
      }, 450);
    }

    function moveWeapon(x, y) {
      weaponX = x;
      weaponY = y;
      const active = level === 1 ? hammer : fist;
      active.style.left = (x - 50) + "px";
      active.style.top = (y - 50) + "px";
    }

    function swingWeapon() {
      const active = level === 1 ? hammer : fist;
      active.classList.remove(level === 1 ? "swing" : "punch");
      void active.offsetWidth;
      active.classList.add(level === 1 ? "swing" : "punch");
    }

    function showFloatText(x, y, texts) {
      const float = document.createElement("div");
      float.className = "floating-text";
      float.textContent = texts[Math.floor(Math.random() * texts.length)];
      float.style.left = x + "px";
      float.style.top = (y - 40) + "px";
      document.body.appendChild(float);
      setTimeout(() => float.remove(), 800);
    }

    function showImpact(x, y, isPunch) {
      const ring = document.createElement("div");
      ring.className = "impact" + (isPunch ? " punch-hit" : "");
      ring.style.left = x + "px";
      ring.style.top = y + "px";
      document.body.appendChild(ring);
      setTimeout(() => ring.remove(), 400);
    }

    function hammerHit() {
      const center = getTargetCenter();

      target.classList.add("hit");
      setTimeout(() => target.classList.remove("hit"), 150);
      showImpact(center.x, center.y, false);
      showFloatText(center.x, center.y, ["Sống tệ nè!", "Nói đạo lí này mày!", "Con lợn nhựa này!"]);

      score += 1;
      scoreEl.textContent = "Điểm: " + score;
      scurryAway();

      if (score >= WIN_SCORE) {
        showVictory("level1");
      }
    }

    function updateHpBar() {
      hpFill.style.width = Math.max(0, (enemyHp / ENEMY_MAX_HP) * 100) + "%";
    }

    function enemyCounter() {
      target.classList.add("counter");
      setTimeout(() => target.classList.remove("counter"), 300);

      const flash = document.createElement("div");
      flash.className = "screen-flash";
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 350);

      showFloatText(window.innerWidth / 2, window.innerHeight / 2 - 60, ["Đỡ đòn đi!", "Còn thiếu lắm!", "Yếu quá!"]);
    }

    function punchHit() {
      const center = getTargetCenter();

      target.classList.add("hit");
      setTimeout(() => target.classList.remove("hit"), 180);
      showImpact(center.x, center.y, true);
      showFloatText(center.x, center.y, ["Đấm!", "Uất!", "Mạnh đấy!", "Trúng rồi!"]);

      enemyHp = Math.max(0, enemyHp - PUNCH_DAMAGE);
      updateHpBar();
      punchCount += 1;

      if (punchCount % COUNTER_EVERY === 0 && enemyHp > 0) {
        setTimeout(enemyCounter, 200);
      }

      if (enemyHp <= 0) {
        setTimeout(() => playFinale(), 300);
      }
    }

    function playFinale() {
      if (finaleSequence) return;
      finaleSequence = true;

      fist.classList.remove("show");
      uiEl.classList.add("finale-hidden");
      hpBar.classList.remove("show");
      hintEl.textContent = "";

      finaleBg.classList.add("show");
      finaleBg.setAttribute("aria-hidden", "false");

      target.style.visibility = "visible";
      target.classList.add("finale-victim");
      setTargetPosition(window.innerWidth / 2, window.innerHeight / 2);

      setTimeout(strikeLightning, 1000);
    }

    function strikeLightning() {
      const rect = target.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const boltHeight = rect.top + rect.height / 2;

      lightning.style.left = (cx - 40) + "px";
      lightning.style.height = boltHeight + "px";
      lightning.classList.remove("strike");
      void lightning.offsetWidth;
      lightning.classList.add("strike");

      document.body.classList.add("finale-flash");
      setTimeout(() => document.body.classList.remove("finale-flash"), 600);

      setTimeout(() => {
        target.classList.add("lightning-hit");
      }, 120);

      setTimeout(() => showVictory("final"), 1600);
    }

    function clearFinale() {
      finaleSequence = false;
      finaleBg.classList.remove("show");
      finaleBg.setAttribute("aria-hidden", "true");
      lightning.classList.remove("strike");
      lightning.style.height = "0";
      target.classList.remove("finale-victim", "lightning-hit");
      target.style.opacity = "";
      target.style.filter = "";
      uiEl.classList.remove("finale-hidden");
      document.body.classList.remove("finale-flash");
    }

    function resetConfetti() {
      document.querySelectorAll(".confetti-piece").forEach((el) => {
        el.style.animation = "none";
        void el.offsetHeight;
        el.style.animation = "";
      });
    }

    function showVictory(mode) {
      if (victoryShown && mode !== "final") return;
      victoryShown = true;
      victoryMode = mode;
      if (mode === "final") finaleSequence = false;

      if (mode === "level1") {
        victoryIcon.textContent = "🙏";
        victoryTitle.textContent = "Thanh tẩy Level 1!";
        victoryDesc.textContent = "Bạn đã giải trừ nghiệp chướng cơ bản.";
        victorySub.textContent = "Giờ phải đấm tay đôi mới thanh tẩy hết được.";
        victoryTap.textContent = "Chạm để vào Level 2";
        target.style.visibility = "hidden";
        hammer.style.visibility = "hidden";
      } else {
        victoryIcon.textContent = "✨";
        victoryTitle.textContent = "Thanh tẩy hoàn tất!";
        victoryDesc.textContent = "Thiên lôi giáng xuống — nghiệp chướng đã tiêu tan.";
        victorySub.textContent = "Phước lành gõ mõ về với bạn...";
        victoryTap.textContent = "Chạm để chơi lại";
        target.style.visibility = "hidden";
      }

      victoryEl.classList.add("show");
      victoryEl.setAttribute("aria-hidden", "false");
      resetConfetti();
    }

    function startLevel2() {
      level = 2;
      document.body.classList.add("level-2");
      target.classList.add("level-2");
      target.style.visibility = "";

      hammer.classList.add("hidden");
      fist.classList.add("show");

      setTargetPosition(window.innerWidth / 2, window.innerHeight / 2);

      enemyHp = ENEMY_MAX_HP;
      punchCount = 0;
      updateHpBar();

      titleEl.textContent = "Phòng thanh tẩy · Lv.2";
      scoreEl.textContent = "Đấm nhau!";
      hpBar.classList.add("show");
      hintEl.textContent = "Chạm trúng đối thủ để đấm!";
    }

    function resetToLevel1() {
      clearFinale();
      level = 1;
      score = 0;
      enemyHp = ENEMY_MAX_HP;
      punchCount = 0;
      document.body.classList.remove("level-2");
      target.classList.remove("level-2");
      target.style.visibility = "";

      hammer.classList.remove("hidden");
      hammer.style.visibility = "";
      fist.classList.remove("show");

      hpBar.classList.remove("show");
      titleEl.textContent = "Phòng thanh tẩy · Lv.1";
      scoreEl.textContent = "Điểm: 0";
      hintEl.textContent = "Phòng sám hối — đập nghiệp chướng!";

      const pos = randomTargetPosition();
      setTargetPosition(pos.x, pos.y);
    }

    function dismissVictory() {
      victoryEl.classList.remove("show");
      victoryEl.setAttribute("aria-hidden", "true");
      victoryShown = false;

      if (victoryMode === "level1") {
        startLevel2();
      } else {
        resetToLevel1();
      }
    }

    const startPos = randomTargetPosition();
    setTargetPosition(startPos.x, startPos.y);

    document.addEventListener("pointermove", (e) => {
      if (e.pointerType === "mouse") moveWeapon(e.clientX, e.clientY);
    }, { passive: true });

    document.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      moveWeapon(e.clientX, e.clientY);

      if (finaleSequence) return;

      if (victoryShown) {
        dismissVictory();
        return;
      }

      swingWeapon();

      if (!isHitOnTarget(e.clientX, e.clientY)) return;

      if (level === 1) {
        hammerHit();
      } else {
        punchHit();
      }
    }, { passive: false });

    window.addEventListener("resize", () => {
      const w = window.innerWidth;
      const h = window.innerHeight;

      if (level === 2) {
        setTargetPosition(w / 2, h / 2);
        return;
      }

      const rect = target.getBoundingClientRect();
      const padX = rect.width / 2 + 20;
      const padY = rect.height / 2 + 60;
      targetX = Math.min(Math.max(targetX, padX), w - padX);
      targetY = Math.min(Math.max(targetY, padY), h - padY);
      setTargetPosition(targetX, targetY);
    });

    moveWeapon(weaponX, weaponY);
  </script>
</body>
</html>
