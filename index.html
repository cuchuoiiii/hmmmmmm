<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Đập Chuột</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      overflow: hidden;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #16213e;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      height: 100vh;
      height: 100dvh;
      cursor: none;
      touch-action: none;
      -webkit-touch-callout: none;
    }

    #game {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* Chuột */
    #mouse {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate3d(-50%, -50%, 0) scaleX(var(--flip, 1));
      height: 120px;
      z-index: 10;
      transition:
        left 0.45s cubic-bezier(0.22, 1, 0.36, 1),
        top 0.45s cubic-bezier(0.22, 1, 0.36, 1),
        transform 0.08s ease;
      cursor: none;
      will-change: left, top;
    }

    .mouse-img {
      height: 120px;
      width: auto;
      display: block;
      pointer-events: none;
      -webkit-user-drag: none;
      border-radius: 10px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
    }

    @media (max-width: 768px) {
      #mouse,
      .mouse-img {
        height: 90px;
      }
    }

    #mouse.hit {
      transform: translate3d(-50%, -50%, 0) scaleX(var(--flip, 1)) scale(0.88) rotate(-6deg);
    }

    #mouse.scurry {
      animation: mouse-wiggle 0.45s ease;
    }

    @keyframes mouse-wiggle {
      0%, 100% { transform: translate3d(-50%, -50%, 0) scaleX(var(--flip, 1)); }
      25%      { transform: translate3d(-50%, -52%, 0) scaleX(var(--flip, 1)) rotate(4deg); }
      50%      { transform: translate3d(-50%, -48%, 0) scaleX(var(--flip, 1)) rotate(-4deg); }
      75%      { transform: translate3d(-50%, -51%, 0) scaleX(var(--flip, 1)) rotate(2deg); }
    }

    .scurry-dust {
      position: fixed;
      font-size: 14px;
      pointer-events: none;
      z-index: 8;
      animation: dust-puff 0.5s ease-out forwards;
    }

    @keyframes dust-puff {
      0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 0.8; }
      100% { transform: translate(-50%, -80%) scale(1.2); opacity: 0; }
    }

    /* Búa */
    #hammer {
      position: fixed;
      width: 100px;
      height: 100px;
      pointer-events: none;
      z-index: 100;
      transform-origin: 80% 80%;
      will-change: transform;
    }

    #hammer.swing {
      animation: hammer-swing 0.25s ease-out;
    }

    @keyframes hammer-swing {
      0%   { transform: rotate(0deg) scale(1); }
      40%  { transform: rotate(-55deg) scale(1.15); }
      100% { transform: rotate(0deg) scale(1); }
    }

    .hammer-head {
      position: absolute;
      top: 0;
      left: 10px;
      width: 70px;
      height: 45px;
      background: linear-gradient(180deg, #8b4513, #5c2e0a);
      border-radius: 8px;
      box-shadow: 2px 4px 8px rgba(0,0,0,0.4);
    }

    .hammer-head::before {
      content: "";
      position: absolute;
      top: -5px;
      left: 5px;
      right: 5px;
      height: 8px;
      background: #a0522d;
      border-radius: 4px;
    }

    .hammer-handle {
      position: absolute;
      bottom: 0;
      left: 35px;
      width: 14px;
      height: 60px;
      background: linear-gradient(90deg, #c4a35a, #8b6914);
      border-radius: 4px;
      transform: rotate(15deg);
      transform-origin: top center;
    }

    /* UI */
    #ui {
      position: fixed;
      top: 20px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 200;
      pointer-events: none;
    }

    #score {
      font-size: 2rem;
      color: #ffd700;
      text-shadow: 0 0 10px rgba(255,215,0,0.5);
      font-weight: bold;
    }

    #hint {
      margin-top: 8px;
      color: rgba(255,255,255,0.6);
      font-size: 0.95rem;
    }

    #version {
      margin-top: 6px;
      color: rgba(255,255,255,0.25);
      font-size: 0.75rem;
    }

    /* Hiệu ứng đập */
    .impact {
      position: fixed;
      width: 80px;
      height: 80px;
      border: 4px solid #ffd700;
      border-radius: 50%;
      pointer-events: none;
      z-index: 40;
      animation: impact-ring 0.4s ease-out forwards;
    }

    @keyframes impact-ring {
      0%   { transform: translate(-50%, -50%) scale(0.3); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
    }

    .floating-text {
      position: fixed;
      color: #ff6b9d;
      font-size: 1.4rem;
      font-weight: bold;
      pointer-events: none;
      z-index: 60;
      animation: float-up 0.8s ease-out forwards;
    }

    @keyframes float-up {
      0%   { transform: translate(-50%, -50%); opacity: 1; }
      100% { transform: translate(-50%, -150%); opacity: 0; }
    }

    /* Thanh tẩy thành công */
    #victory {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s ease;
    }

    #victory.show {
      opacity: 1;
      pointer-events: auto;
    }

    .victory-bg {
      position: absolute;
      inset: 0;
      background: rgba(8, 12, 32, 0.88);
    }

    .victory-glow {
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 215, 0, 0.35) 0%, transparent 70%);
      animation: glow-pulse 2s ease-in-out infinite;
    }

    @keyframes glow-pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50%      { transform: scale(1.15); opacity: 1; }
    }

    .victory-card {
      position: relative;
      max-width: 340px;
      width: 100%;
      padding: 32px 24px;
      text-align: center;
      background: linear-gradient(160deg, #1e2a4a 0%, #121a30 100%);
      border: 2px solid rgba(255, 215, 0, 0.45);
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      transform: scale(0.85);
      opacity: 0;
    }

    #victory.show .victory-card {
      animation: card-pop 0.55s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
    }

    @keyframes card-pop {
      to { transform: scale(1); opacity: 1; }
    }

    .victory-icon {
      font-size: 3rem;
      line-height: 1;
      margin-bottom: 12px;
      animation: icon-bounce 0.8s ease 0.3s both;
    }

    @keyframes icon-bounce {
      0%   { transform: scale(0); }
      60%  { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .victory-card h1 {
      color: #ffd700;
      font-size: 1.35rem;
      line-height: 1.4;
      margin-bottom: 10px;
    }

    .victory-card p {
      color: rgba(255, 255, 255, 0.85);
      font-size: 1rem;
      line-height: 1.5;
    }

    .victory-sub {
      margin-top: 8px;
      color: rgba(255, 255, 255, 0.55) !important;
      font-size: 0.9rem !important;
    }

    .victory-tap {
      margin-top: 20px;
      padding: 10px 16px;
      color: rgba(255, 215, 0, 0.8);
      font-size: 0.85rem;
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 999px;
      animation: tap-blink 1.5s ease-in-out infinite;
    }

    @keyframes tap-blink {
      0%, 100% { opacity: 0.6; }
      50%      { opacity: 1; }
    }

    .confetti-piece {
      position: absolute;
      top: -10px;
      width: 8px;
      height: 14px;
      border-radius: 2px;
      opacity: 0;
      pointer-events: none;
    }

    #victory.show .confetti-piece {
      animation: confetti-fall 2.2s ease-out forwards;
    }

    .confetti-piece:nth-child(1) { left: 12%; background: #ffd700; animation-delay: 0.1s; }
    .confetti-piece:nth-child(2) { left: 28%; background: #ff6b9d; animation-delay: 0.2s; }
    .confetti-piece:nth-child(3) { left: 45%; background: #7ee8fa; animation-delay: 0.05s; }
    .confetti-piece:nth-child(4) { left: 62%; background: #c9a0ff; animation-delay: 0.25s; }
    .confetti-piece:nth-child(5) { left: 78%; background: #90ee90; animation-delay: 0.15s; }
    .confetti-piece:nth-child(6) { left: 90%; background: #ffa07a; animation-delay: 0.3s; }

    @keyframes confetti-fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="game">
    <div id="ui">
      <div id="score">Điểm: 0</div>
      <div id="hint">phòng sám hối!</div>
      <div id="version">v5</div>
    </div>

    <div id="mouse">
      <img class="mouse-img" src="mouse.png" alt="Hoadai" draggable="false" />
    </div>

    <div id="hammer">
      <div class="hammer-head"></div>
      <div class="hammer-handle"></div>
    </div>
  </div>

  <div id="victory" aria-hidden="true">
    <div class="victory-bg"></div>
    <div class="victory-glow"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="victory-card">
      <div class="victory-icon">🙏</div>
      <h1>Thanh tẩy thành công!</h1>
      <p>Bạn đã giải trừ nghiệp chướng này.</p>
      <p class="victory-sub">Phước lành gõ mõ về với bạn...</p>
      <div class="victory-tap">Chạm để tiếp tục</div>
    </div>
  </div>

  <script>
    const hammer = document.getElementById("hammer");
    const mouse = document.getElementById("mouse");
    const scoreEl = document.getElementById("score");
    const victoryEl = document.getElementById("victory");

    const SHOW_DUST = false;
    const WIN_SCORE = 10;

    let score = 0;
    let victoryShown = false;
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let isScurrying = false;
    let hammerX = mouseX;
    let hammerY = mouseY;

    function setMousePosition(x, y) {
      mouseX = x;
      mouseY = y;
      mouse.style.left = x + "px";
      mouse.style.top = y + "px";
    }

    function randomMousePosition(fromX, fromY) {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const rect = mouse.getBoundingClientRect();
      const padX = rect.width / 2 + 20;
      const padY = rect.height / 2 + 60;
      let x, y, tries = 0;

      do {
        x = padX + Math.random() * (w - padX * 2);
        y = padY + Math.random() * (h - padY * 2);
        tries++;
      } while (
        tries < 20 &&
        fromX !== undefined &&
        Math.hypot(x - fromX, y - fromY) < Math.min(w, h) * 0.25
      );

      return { x, y };
    }

    function getMouseCenter() {
      return { x: mouseX, y: mouseY };
    }

    function isClickOnMouse(x, y) {
      const rect = mouse.getBoundingClientRect();
      const pad = 20;
      return (
        x >= rect.left - pad &&
        x <= rect.right + pad &&
        y >= rect.top - pad &&
        y <= rect.bottom + pad
      );
    }

    function scurryMouseAway() {
      if (isScurrying) return;
      isScurrying = true;

      const { x: newX, y: newY } = randomMousePosition(mouseX, mouseY);
      const flip = newX < mouseX ? -1 : 1;
      mouse.style.setProperty("--flip", flip);

      mouse.classList.add("scurry");
      setMousePosition(newX, newY);

      if (SHOW_DUST) {
        const center = getMouseCenter();
        for (let i = 0; i < 2; i++) {
          const dust = document.createElement("div");
          dust.className = "scurry-dust";
          dust.textContent = "💨";
          dust.style.left = (center.x + (Math.random() - 0.5) * 40) + "px";
          dust.style.top = (center.y + (Math.random() - 0.5) * 20) + "px";
          document.body.appendChild(dust);
          setTimeout(() => dust.remove(), 500);
        }
      }

      setTimeout(() => {
        mouse.classList.remove("scurry");
        isScurrying = false;
      }, 450);
    }

    const startPos = randomMousePosition();
    setMousePosition(startPos.x, startPos.y);

    function moveHammer(x, y) {
      hammerX = x;
      hammerY = y;
      hammer.style.left = (x - 50) + "px";
      hammer.style.top = (y - 50) + "px";
    }

    document.addEventListener("pointermove", (e) => {
      if (e.pointerType === "mouse") moveHammer(e.clientX, e.clientY);
    }, { passive: true });

    document.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      moveHammer(e.clientX, e.clientY);

      if (victoryShown) {
        dismissVictory();
        return;
      }

      swingHammer();

      if (!isClickOnMouse(e.clientX, e.clientY)) return;

      hammerHit(e.clientX, e.clientY);
    }, { passive: false });

    function swingHammer() {
      hammer.classList.remove("swing");
      void hammer.offsetWidth;
      hammer.classList.add("swing");
    }

    function hammerHit(x, y) {
      const center = getMouseCenter();

      mouse.classList.add("hit");
      setTimeout(() => mouse.classList.remove("hit"), 150);

      const ring = document.createElement("div");
      ring.className = "impact";
      ring.style.left = center.x + "px";
      ring.style.top = center.y + "px";
      document.body.appendChild(ring);
      setTimeout(() => ring.remove(), 400);

      const texts = ["Sống tệ nè!", "Nói đạo lí này mày!", "con lợn nhựa này!", "Chạy đi!"];
      const float = document.createElement("div");
      float.className = "floating-text";
      float.textContent = texts[Math.floor(Math.random() * texts.length)];
      float.style.left = center.x + "px";
      float.style.top = (center.y - 40) + "px";
      document.body.appendChild(float);
      setTimeout(() => float.remove(), 800);

      score += 1;
      scoreEl.textContent = "Điểm: " + score;

      scurryMouseAway();

      if (score >= WIN_SCORE) {
        showVictory();
      }
    }

    function showVictory() {
      if (victoryShown) return;
      victoryShown = true;
      victoryEl.classList.add("show");
      victoryEl.setAttribute("aria-hidden", "false");
      mouse.style.visibility = "hidden";
      hammer.style.visibility = "hidden";

      document.querySelectorAll(".confetti-piece").forEach((el) => {
        el.style.animation = "none";
        void el.offsetHeight;
        el.style.animation = "";
      });
    }

    function dismissVictory() {
      victoryShown = false;
      score = 0;
      scoreEl.textContent = "Điểm: 0";
      victoryEl.classList.remove("show");
      victoryEl.setAttribute("aria-hidden", "true");
      mouse.style.visibility = "";
      hammer.style.visibility = "";
      const pos = randomMousePosition();
      setMousePosition(pos.x, pos.y);
    }

    window.addEventListener("resize", () => {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const rect = mouse.getBoundingClientRect();
      const padX = rect.width / 2 + 20;
      const padY = rect.height / 2 + 60;
      mouseX = Math.min(Math.max(mouseX, padX), w - padX);
      mouseY = Math.min(Math.max(mouseY, padY), h - padY);
      setMousePosition(mouseX, mouseY);
    });

    moveHammer(hammerX, hammerY);
  </script>
</body>
</html>
